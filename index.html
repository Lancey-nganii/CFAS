<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CFAS Study Guide — Millan 2024</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8f7f5;--surface:#ffffff;--text:#111;--muted:#666;--accent:#6f62d6;--shadow:0 18px 40px rgba(0,0,0,.08)}
    [data-theme="dark"]{--bg:#111318;--surface:#1d222b;--text:#eef0f5;--muted:#a6abb7;}
    *{box-sizing:border-box}
    body{margin:0;font-family:'DM Sans',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:1100px;margin:0 auto;padding:20px 18px 36px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0 12px;position:sticky;top:0;background:var(--bg);z-index:50}
    .brand{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}
    .brand::before{content:'CFAS';background:var(--accent);color:#fff;padding:8px 10px;border-radius:999px;font-size:12px}
    h1{font-family:'Instrument Serif',serif;font-size:34px;margin:0 0 4px}
    .subtitle{margin:0 0 20px;color:var(--muted);line-height:1.45}
    .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;padding:12px 0}
    .section-buttons{display:flex;flex-wrap:wrap;gap:8px}
    .btn,button{font:inherit;cursor:pointer;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:9px 16px;background:rgba(255,255,255,.88);transition:.2s ease;color:var(--text)}
    [data-theme="dark"] .btn, [data-theme="dark"] button{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:var(--text)}
    .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .search input{min-width:240px;width:320px;max-width:100%;padding:10px 14px;border-radius:999px;border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.92)}
    [data-theme="dark"] .search input{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:var(--text)}
    #grid{display:grid;grid-template-columns:1fr;gap:14px;padding-top:16px}
    @media(min-width:720px){#grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(min-width:1040px){#grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    .card{background:var(--surface);padding:18px 18px 16px;border-radius:20px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);cursor:pointer;display:flex;flex-direction:column;gap:10px;min-height:170px}
    .card:hover{transform:translateY(-1px)}
    .code{display:inline-flex;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(111,98,214,.12);color:var(--accent);width:max-content}
    .card-title{font-size:16px;font-weight:700;line-height:1.3}
    .card-sub{color:var(--muted);font-size:14px;line-height:1.5;flex:1}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:100}
    .modal-backdrop.show{display:flex}
    .modal{width:min(760px,100%);max-height:90vh;overflow-y:auto;background:var(--surface);border-radius:22px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.18)}
    .modal h2{margin-top:0}
    .modal p{margin:10px 0;line-height:1.6;color:var(--muted)}
    .field{margin-top:14px}
    .field strong{display:block;color:var(--text);margin-bottom:6px}
    .field div{line-height:1.6;color:var(--muted)}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);padding:10px 18px;border-radius:999px;background:#111;color:#fff;opacity:0;pointer-events:none;transition:.25s ease}
    .toast.show{opacity:1}
    .error-banner{position:fixed;right:18px;bottom:18px;max-width:360px;padding:12px 14px;background:#fff3f3;color:#991b1b;border:1px solid #f5c2c7;border-radius:14px;display:none;z-index:200}
    .error-banner.show{display:block}
    footer{padding-top:24px;color:var(--muted);font-size:13px;text-align:center}
  </style>
</head>

    <h1>CFAS Accounting Standards</h1>
    <p class="subtitle">CFAS study guide for my baby elaine</p>
    <div class="filters">
      <div class="section-buttons">
        <button class="btn active" data-cat="all">All</button>

        <button class="btn" data-cat="PAS">PAS</button>

  <div id="toast" class="toast">Copied to clipboard</div>

  <footer>Based on Conceptual Framework and Accounting Standards by Zeus Vernon B. Millan, 2024.</footer>

  <script>
    const STANDARDS = [
      {id:'CF',cat:'CF',code:'Conceptual Framework',title:'Conceptual Framework for Financial Reporting',key:'Provides the foundation for developing Standards: objective of financial reporting; primary users (investors, lenders, creditors); qualitative characteristics (relevance + faithful representation = fundamental; comparability, verifiability, timeliness, understandability = enhancing); elements (assets, liabilities, equity, income, expenses); recognition criteria; measurement bases (historical cost & current value); concepts of capital.',example:'Entity A owns land at ₱1M cost. The Framework guides recognition: it is an asset (present economic resource — right; potential economic benefits; controlled by entity from past event). Measurement basis (historical cost vs. fair value) depends on the applicable standard. Conceptual Framework helps resolve issues where no specific PFRS exists.',takeaway:'CF is NOT a Standard — it is the foundation. When CF conflicts with a Standard, the Standard prevails. Remember: The Framework builds the house; the Standards furnish each room. Key equation: Assets − Liabilities = Equity.'},
      {id:'PAS-1',cat:'PAS',code:'PAS 1',title:'Presentation of Financial Statements',key:'Complete set of FS: (1) SFP, (2) Statement of P&L and OCI, (3) SOCE, (4) SCF, (5) Notes, (5a) Comparatives, (6) Additional SFP. Eight general features: fair presentation, going concern, accrual basis (except SCF), materiality & aggregation, no offsetting, annual frequency, comparative info, consistency. Classified or unclassified SFP. OCI grouped by recyclable vs. non-recyclable. No extraordinary items. Expenses by nature or function.',example:'ABC Corp December 31, 2023: presents all 6 components with Dec 31, 2022 comparatives. A ₱5M bank loan maturing March 2024 = current liability (no right to defer at year-end). Deferred tax assets/liabilities = always noncurrent. Dividends declared January 2024 = non-adjusting event, disclose in notes only. Function-of-expense method chosen: shows cost of sales, distribution costs, and admin expenses separately.',takeaway:'PAS 1 = The Blueprint. WHAT to present and HOW. No offsetting. No extraordinary items. Deferred tax = always noncurrent. Two options for expenses: Nature (purchases, wages) or Function (cost of sales, distribution). Fair Presentation + Going Concern + Accrual = Compliant.'},
      {id:'PAS-2',cat:'PAS',code:'PAS 2',title:'Inventories',key:'Inventories = assets held for sale (finished goods), in production (WIP), or to be consumed (raw materials). Measured at lower of Cost and NRV. Cost = purchase price (net of trade discounts) + import duties + non-refundable taxes + freight-in + conversion costs. Excluded from cost: abnormal waste, storage of finished goods, admin overhead, selling costs (freight-out). Cost formulas: Specific identification (non-interchangeable), FIFO, or Weighted Average. LIFO = PROHIBITED. NRV = selling price − costs to complete − costs to sell. Write-down to NRV = expense; reversal limited to original write-down.',example:'Entity A buys 1,000 units at ₱100 + ₱5K freight-in = total cost ₱105K. Year-end NRV = ₱90/unit = ₱90K. Write-down ₱15K to expense. Next year NRV = ₱95/unit → reverse ₱5K (not more than ₱15K original write-down). Freight-out (selling cost) = expensed, not inventoriable. Trade discount deducted from purchase price.',takeaway:'PAS 2 = Lower of Cost or NRV. LIFO is banned. FIFO or Weighted Average only. Freight-in = cost. Freight-out = expense. Write down when NRV < cost; limited reversal allowed. Never value inventory above what you can recover.'},
      {id:'PAS-7',cat:'PAS',code:'PAS 7',title:'Statement of Cash Flows',key:'Cash equivalents = ≤3 months to maturity. Three sections: Operating (P&L activities), Investing (noncurrent asset acquisitions/disposals), Financing (equity and borrowing changes). Operating: Direct method (gross receipts/payments) — encouraged; or Indirect method (profit ± adjustments). Held-for-trading securities = operating. Financial institution loans = operating. Non-financial institutions: interest received (operating or investing), interest paid (operating or financing), dividends received (operating or investing), dividends paid (operating or financing). Non-cash transactions excluded — disclosed in notes.',example:'DEF Corp: Net income ₱500K. Indirect: +Depreciation ₱80K −Increase in receivables ₱30K = Operating CF ₱550K. Equipment purchase ₱200K = Investing outflow. Loan proceeds ₱100K = Financing inflow. Equipment acquired via note payable (non-cash) = excluded from SCF, disclosed in notes only.',takeaway:'PAS 7 = Follow the Cash. OIF buckets: Operating (income), Investing (assets), Financing (debt/equity). Indirect method: start with profit, add back non-cash. Direct method is preferred but rarely used. Non-cash transactions = Notes only.'},
      {id:'PAS-8',cat:'PAS',code:'PAS 8',title:'Accounting Policies, Changes in Accounting Estimates and Errors',key:'Hierarchy: (1) Applicable PFRS; (2) Judgment using Conceptual Framework + similar PFRSs; (3) May consider other standard-setters. Change in Accounting POLICY: required by PFRS or results in more relevant/reliable info → retrospective application (restate prior periods). Change in Accounting ESTIMATE: new info/developments → prospective (current + future periods only). If cannot distinguish → treat as estimate change. Prior Period ERRORS: fraud, mistakes, misapplication → retrospective restatement. Early adoption of PFRS ≠ voluntary policy change.',example:'GHI Corp: (1) Changes depreciation from SL to diminishing balance = ESTIMATE CHANGE → prospective from current year. (2) Failed to accrue warranty expense in 2022 = ERROR → restate 2022 comparatives. (3) First-time adoption of PFRS 16 = POLICY CHANGE → retrospective restatement of prior periods.',takeaway:'Three types, three treatments: POLICY = restate Backward (retrospective). ESTIMATE = go Forward (prospective). ERROR = restate. Memory: PPE — Policy Past, Estimate Future. When in doubt between policy and estimate = treat as estimate.'},
      {id:'PAS-10',cat:'PAS',code:'PAS 10',title:'Events After the Reporting Period',key:'Events between END of reporting period and DATE FS authorized for issue. Date of authorization = when management (not shareholders).authorizes FS. ADJUSTING events: provide evidence of conditions that EXISTED at year-end → adjust FS. Examples: customer bankruptcy (receivable existed), post-year-end inventory sale (confirms NRV), settlement of lawsuit confirming year-end liability, fraud discovery. NON-ADJUSTING events: conditions that AROSE after year-end → disclose only if material. Examples: fire, major acquisition, restructuring plan, dividends declared. Dividends declared after year-end = non-adjusting (no liability).',example:'JKL Corp year-end Dec 31; authorized March 15. Jan 20: Customer X bankrupt (receivable balance existed at Dec 31) = ADJUSTING → write off in 2023 FS. Feb 10: Warehouse fire = NON-ADJUSTING → disclose in notes only. March 5: ₱1M dividends declared = NON-ADJUSTING → note disclosure, NOT 2023 liability.',takeaway:'PAS 10: Existed before year-end = Adjust. Arose after year-end = Disclose. Easy test: Did the condition EXIST at December 31? Yes → Adjust. No → Note only. Dividends after year-end = NEVER a current-year liability.'},
      {id:'PAS-11',cat:'PAS',code:'PAS 11',title:'Construction Contracts',key:'Superseded by PFRS 15 for periods beginning Jan 1, 2018. Percentage of completion method: recognize revenue and costs as work progresses. Stage of completion measured by: costs incurred ÷ total estimated costs; surveys; physical proportion. If outcome cannot be estimated: recognize revenue only to extent of recoverable costs. Expected loss recognized immediately in FULL. Variations, claims, and incentive payments included when probable and reliably measurable.',example:'JKL Builders: ₱10M contract, estimated cost ₱8M. By year-end: ₱4M incurred = 50% complete. Revenue = ₱5M; Contract costs = ₱4M; Gross profit = ₱1M. If revised total cost becomes ₱11M (loss contract) → recognize full ₱1M expected loss immediately.',takeaway:'PAS 11 (superseded by PFRS 15): Revenue recognized AS YOU BUILD, not when done. % complete = costs incurred ÷ total estimated costs. Expected losses = recognized IMMEDIATELY in full. Now replaced by the 5-step PFRS 15 model.'},
      {id:'PAS-12',cat:'PAS',code:'PAS 12',title:'Income Taxes',key:'Accounting profit (per PFRSs) vs. Taxable profit (per tax law/BIR). Current tax = taxes payable to BIR on taxable profit. Income tax expense = current tax + deferred tax. Temporary differences: between carrying amount and tax base. Taxable temporary diff → Deferred Tax LIABILITY (DTL). Deductible temporary diff → Deferred Tax ASSET (DTA). DTA recognized only when probable future taxable profit available. Permanent differences → NO deferred tax. Deferred taxes NOT discounted. Always presented as NONCURRENT. Asset-liability method (balance sheet method).',example:'MNO Corp: Accounting profit ₱1M; depreciation per books ₱200K, per BIR ₱300K. Taxable profit = ₱900K. Current tax = ₱900K × 25% = ₱225K. Temporary diff ₱100K (book CA > tax base) → DTL = ₱25K. Total income tax expense = ₱250K. Bad debts per books but deductible only when written off → DTA.',takeaway:'PAS 12 = Books vs. BIR. Taxable diff → DTL (pay more tax later). Deductible diff → DTA (pay less tax later). Permanent differences = no deferred tax ever. Deferred tax = always noncurrent, never discounted.'},
      {id:'PAS-16',cat:'PAS',code:'PAS 16',title:'Property, Plant and Equipment',key:'PPE: tangible, used in business, expected useful life >1 year. Initial cost = purchase price (net of trade discounts) + directly attributable costs (freight, installation, testing, professional fees) + PV of decommissioning costs. Exclude: abnormal waste, opening costs, admin overhead. Two subsequent measurement models (applied per class): (1) Cost model = cost − accumulated depreciation − impairment; (2) Revaluation model = FV less subsequent depreciation/impairment; revaluation increase → OCI (Revaluation Surplus); decrease → reduces surplus first, excess to P&L. Depreciation: systematic allocation over useful life; starts when available for use; SL, diminishing balance, or units-of-production. Components depreciated separately. Land NOT depreciated. Depreciation does not cease when idle. Disposal gain/loss = proceeds − carrying amount → P&L.',example:'PQR Corp buys machine: ₱1M price + ₱20K freight + ₱30K installation + ₱50K testing − ₱10K (opening ceremony excluded) = cost ₱1.1M. Useful life 10yr, residual ₱100K → SL depreciation = ₱100K/yr. Revaluation at Year 5: CA ₱600K, FV ₱700K → ₱100K revaluation surplus in OCI. Sale at Year 6: proceeds ₱680K − CA ₱560K = ₱120K gain in P&L; transfer revaluation surplus to retained earnings.',takeaway:'PAS 16 = Capitalize what it costs to get the asset ready. Two models: Cost or Revaluation (consistent per class). Revaluation gain → OCI not P&L. Land = never depreciated. Component parts depreciated separately. Disposal = Proceeds − CA.'},
      {id:'PAS-17',cat:'PAS',code:'PAS 17',title:'Leases',key:'Superseded by PFRS 16 (Jan 1, 2019). Lessee: Finance lease (transfers substantially all risks/rewards) = recognize asset + liability; payments split into principal + interest. Operating lease = straight-line expense. Finance lease indicators: ownership transfer, bargain purchase option, lease term ≥ major part of useful life, PV of payments ≈ substantially all of FV, specialized nature. Lessor: Finance lease → derecognize asset, recognize receivable; Operating lease → keep asset, recognize rent income straight-line.',example:'STU Corp leases equipment 8 of 10-year life at ₱500K/year. Substantially all risks transferred → FINANCE LEASE. Lessee records: asset at lower of FV or PV of minimum lease payments; corresponding lease liability. Annual payment split: interest expense + principal repayment. Lessor records net investment in the lease.',takeaway:'PAS 17 (superseded by PFRS 16): Finance lease = you act as owner (asset on your balance sheet). Operating lease = just rent expense. Key test: Does the lease TRANSFER risks and rewards of ownership?'},
      {id:'PAS-18',cat:'PAS',code:'PAS 18',title:'Revenue',key:'Superseded by PFRS 15 (Jan 1, 2018). Revenue from sale of goods: recognized when (1) risks/rewards transferred, (2) no continuing managerial involvement, (3) reliable measurement, (4) probable economic benefits, (5) costs can be measured. Revenue from services: percentage of completion if outcome reliably estimated; otherwise recognize only to extent of recoverable costs. Interest = effective interest method. Royalties = accrual basis. Dividends = when right to receive established. Revenue at FV of consideration.',example:'VWX Co. sells goods ₱1M; delivers and transfers risks → recognize ₱1M revenue at delivery. 3-year maintenance contract ₱300K → recognize ₱100K/year using % completion. Dividend from investment declared by investee → recognize when declared (right established).',takeaway:'PAS 18 (superseded by PFRS 15): Revenue recognized when risks and rewards TRANSFER. Services use % completion. Now replaced by the 5-step PFRS 15 model focused on CONTROL transfer.'},
      {id:'PAS-19',cat:'PAS',code:'PAS 19',title:'Employee Benefits',key:'Four categories: (1) Short-term (due ≤12 months): wages, SSS/PhilHealth/Pag-IBIG, paid leaves, bonuses — expense when service rendered. (2) Post-employment: DC plan (fixed contributions, expense = contribution paid) or DB plan (defined benefit obligation using Projected Unit Credit Method; 3-step: deficit/surplus → net DB liability/asset → DB cost). DB cost: service cost + net interest → P&L; remeasurements (actuarial gains/losses) → OCI NOT RECYCLED. (3) Other long-term: all components to P&L (no OCI). (4) Termination benefits: recognize when committed. Compensated absences: accumulating+vesting = accrue all; accumulating+non-vesting = accrue expected; non-accumulating = when absence occurs.',example:'STU Corp DB plan: PV of DBO = ₱10M; FVPA = ₱8M → Net DB liability = ₱2M (noncurrent). Current service cost ₱500K + net interest ₱100K = ₱600K in P&L. Actuarial loss ₱200K → OCI (stays there, never recycled to P&L). DC plan: contribute ₱300K → expense ₱300K regardless of retirement payouts.',takeaway:'PAS 19: DC = simple, expense contributions. DB = complex 3-step process. KEY: Remeasurements (actuarial gains/losses) → OCI ONLY, never recycled to P&L. Defined Contribution = Certain cost. Defined Benefit = Uncertain obligation.'},
      {id:'PAS-20',cat:'PAS',code:'PAS 20',title:'Accounting for Government Grants',key:'Recognize grants when: (1) conditions will be complied with AND (2) grants will be received. Income approach: recognize in P&L systematically matching related costs. Two types: (1) Grants related to assets: Gross method = deferred income liability released matching depreciation; OR Net method = deduct from asset carrying amount. (2) Grants related to income: match with related expense. Grants for losses already incurred → recognize immediately. Non-monetary grants at FV (or nominal amount). Repayment = prospective (change in estimate). Tax benefits NOT within PAS 20 scope.',example:'VWX Corp: ₱5M grant to purchase ₱25M machine (10-yr life, zero residual). Gross method: record ₱5M deferred income; release ₱500K/year income matching ₱2.5M annual depreciation. Net method: machine at ₱20M; annual depreciation = ₱2M. Same net P&L effect both methods. Grant for ₱2M flood damage already incurred → recognize ₱2M income immediately.',takeaway:'PAS 20: Match grant income with the related expense or depreciation. Gross = show both full asset and deferred liability. Net = reduce asset. Same P&L effect. Tax holidays and income tax credits are NOT PAS 20 grants.'},
      {id:'PAS-21',cat:'PAS',code:'PAS 21',title:'Effects of Changes in Foreign Exchange Rates',key:'Functional currency = primary economic environment currency. All other currencies = foreign. FX transactions: record at SPOT RATE at transaction date. Subsequent: MONETARY items (cash, receivables, payables) → CLOSING rate; exchange differences → P&L. NON-MONETARY items at historical cost → HISTORICAL rate (frozen). Non-monetary at FV → rate when FV determined. Translation of foreign operations: assets/liabilities → CLOSING rate; income/expenses → transaction rates (or average); resulting differences → OCI (translation reserve — recyclable on disposal). Change in functional currency = prospective.',example:'YZA Corp (PHP functional): sells to US buyer $100K on Dec 1 (rate ₱50/$) → receivable ₱5M. Dec 31 rate ₱52/$ → receivable restated ₱5.2M → ₱200K FOREX GAIN in P&L. Inventory purchased for $50K on Dec 1 stays at ₱2.5M at Dec 31 (non-monetary, historical rate). Japan branch: assets/liabilities translated at Dec 31 closing rate; translation differences → OCI.',takeaway:'PAS 21: MONETARY items follow closing rate (gains/losses to P&L). NON-MONETARY items at cost = frozen at historical rate. Foreign operation translation differences → OCI. Moneys Move (closing rate); Things Stay (historical rate).'},
      {id:'PAS-23',cat:'PAS',code:'PAS 23',title:'Borrowing Costs',key:'Qualifying asset: necessarily takes SUBSTANTIAL period of time to get ready (PPE under construction, self-built buildings, ships, intangibles in development). NOT qualifying: financial assets, inventory routinely produced, assets ready when acquired, FV-measured assets. Directly attributable borrowing costs on qualifying assets = CAPITALIZE (mandatory). Others = expense. Specific borrowings: capitalizable = actual costs − investment income on temporarily invested surplus. General borrowings: capitalizable = average expenditure × capitalization rate (= total interest/total general borrowings); capped at actual costs. Commence: expenditures + borrowing costs + activities all happening. Suspend during extended interruption. Cease when substantially complete.',example:'HIJ Corp: ₱10M specific loan at 12% for building construction (Jan 1). Surplus ₱2M invested for 6 months at 5% = ₱50K income. Capitalizable cost = (₱10M×12%×6/12) − ₱50K = ₱600K − ₱50K = ₱550K added to building cost. General borrowing: 14% weighted average rate × ₱8M average expenditure on another project = ₱1.12M capitalizable (if ≤ actual interest).',takeaway:'PAS 23: Build a qualifying asset = capitalize the interest. Specific loan: net of investment income. General loans: weighted average rate × average expenditure. Suspend if construction stops. Cease when substantially complete. Interest on construction = part of the building cost.'},
      {id:'PAS-24',cat:'PAS',code:'PAS 24',title:'Related Party Disclosures',key:'Related parties: parent, subsidiaries, fellow subsidiaries, associates, JVs, KMP and close family, entities controlled by KMP/family, post-employment benefit plans. NOT related: common director only, co-venturers only, customers/suppliers with mere economic dependence, government regulators. Disclose: nature of relationship; nature, terms, and amount of transactions; outstanding balances; provision for doubtful debts; bad debts expense. KMP compensation: by category (short-term, post-employment, other long-term, termination, share-based). Parent-subsidiary relationship: ALWAYS disclose even with NO transactions. Arm\'s length statements: do NOT make unless substantiated.',example:'JKL Corp (subsidiary of MNO Group) sells goods to parent ₱15M at market price. Disclose: (1) relationship; (2) transaction ₱15M; (3) outstanding receivable ₱3M. CEO total compensation ₱5M: salary ₱3M, car plan ₱500K, retirement contributions ₱1.5M — all disclosed by category. Even if JKL had zero transactions with parent, still disclose the parent-subsidiary relationship.',takeaway:'PAS 24: Who do you know? Disclose ALL related party transactions — even at arm\'s length prices. Always disclose parent-subsidiary relationship even with NO transactions. KMP compensation must always be disclosed by category. Transparency over privacy.'},
      {id:'PAS-26',cat:'PAS',code:'PAS 26',title:'Accounting and Reporting by Retirement Benefit Plans',key:'Applies to the PLAN itself (trustee/fund) — NOT the employer. Complements PAS 19. DC Plan FS: statement of net assets available for benefits + statement of changes in net assets + notes. No actuarial PV of promised benefits required for DC. DB Plan FS: EITHER (a) full statement showing net assets + actuarial PV of promised benefits + surplus/deficit; OR (b) net assets with actuarial PV in notes or separate actuarial report. Plan assets at FAIR VALUE. Actuarial valuation every 3 years minimum for DB. Hybrid plans (DC+DB features) → treated as DB.',example:'PQR Employees\' Retirement Fund (DB plan) prepares its annual FS: FVPA = ₱50M, admin liabilities = ₱2M, net assets available = ₱48M; actuarial PV of promised benefits = ₱45M; surplus = ₱3M. DC fund: just shows net assets available for benefits (₱48M) — no actuarial calculation needed.',takeaway:'PAS 26 = From the FUND\'s point of view (not the employer). DC fund: just show net assets. DB fund: show net assets AND actuarial obligation. PAS 19 = employer reporting; PAS 26 = fund/plan reporting. The pension fund reports to its beneficiaries.'},
      {id:'PAS-27',cat:'PAS',code:'PAS 27',title:'Separate Financial Statements',key:'Separate financial statements (SFS): presented IN ADDITION TO consolidated FS or equity-method FS — NOT a substitute. Optional unless required by law. In SFS, investments in subsidiaries/associates/JVs measured using ONE chosen method consistently: (1) Cost; (2) PFRS 9 (FV); or (3) Equity method. If FVTPL in main FS → FVTPL in SFS too. Dividends from subsidiaries in SFS: recognized in P&L when RIGHT TO RECEIVE established (not reduced from investment — unless equity method). SFS must disclose method used and that these are separate FS.',example:'STU Holdings prepares consolidated FS (group view) AND separate FS (parent alone). In SFS under cost method: Investment in subsidiary VWX Corp remains at original cost ₱50M regardless of VWX profits/losses. Dividends received from VWX = income in STU\'s SFS P&L. Under equity method in SFS: investment adjusted for share of VWX\'s profit/loss.',takeaway:'PAS 27: Separate FS = parent\'s own individual books. Three choices for investment: Cost, FV (PFRS 9), or Equity method — consistent per category. Dividends = income under cost/FV method; reduces investment under equity method. Always prepared alongside consolidated FS.'},
      {id:'PAS-28',cat:'PAS',code:'PAS 28',title:'Investments in Associates and Joint Ventures',key:'Associate: entity where investor has SIGNIFICANT INFLUENCE (usually 20–50% voting power). Evidence: board seat, policy participation, material transactions, management interchange, technical information. Equity method: initial at COST; adjust for share of: profit/loss (income/expense), dividends (REDUCE investment), OCI (investor\'s share in OCI). Goodwill embedded in investment: not amortized, tested for impairment as part of investment. Share of losses: limited to investment CA + unsecured long-term interests. Stop when zero. Uniform accounting policies. JVs under PFRS 11: equity method only (no proportionate consolidation).',example:'VWX Corp holds 30% of YZA Inc. Cost: ₱3M. YZA earns ₱1M → VWX +₱300K income; investment = ₱3.3M. YZA pays ₱500K dividends → VWX -₱150K; investment = ₱3.15M. YZA has ₱200K OCI → VWX +₱60K OCI. YZA loses ₱12M → VWX shares only ₱3M loss (investment zeroed); stop recognizing further losses.',takeaway:'PAS 28: 20–50% = Associate → Equity Method. Investment grows with profits, shrinks with losses and dividends. Dividends = NOT income (reduce investment). Share losses only up to investment balance. "You share in their net worth, not just their dividends."'},
      {id:'PAS-29',cat:'PAS',code:'PAS 29',title:'Financial Reporting in Hyperinflationary Economies',key:'Hyperinflation indicators (judgment): 3-year cumulative inflation ≈ or >100%; population prefers non-monetary assets or stable foreign currency; prices quoted in stable currency; interest/wages linked to price index. Restatement: all FS expressed in measuring unit at END of reporting period. NON-MONETARY items at historical cost: RESTATED using general price index from acquisition date. MONETARY items: NOT restated (already current). Formula: historical cost × (current index / historical index). Income statement items restated from recognition date. Gain/loss on net monetary position → P&L. Comparatives also restated.',example:'BCD Corp: 3-year cumulative inflation 150%. Land purchased 3 years ago ₱1M; index at purchase = 100, current = 250. Restated land = ₱1M × 250/100 = ₱2.5M. Cash ₱500K = NOT restated (already in current pesos). Revenue earned evenly: average index/period-end index applied to restate.',takeaway:'PAS 29: Hyperinflation = restate NON-MONETARY items using price index. MONETARY items already current — do not restate. Formula: Cost × (Current index / Historical index). 3-year cumulative inflation > 100% = trigger. Adjust for what money lost while holding those assets.'},
      {id:'PAS-32',cat:'PAS',code:'PAS 32',title:'Financial Instruments: Presentation',key:'Financial instrument: contract → financial asset of one + financial liability or equity of another. FA: cash, equity instruments of others, contractual right to receive cash. FL: contractual obligation to pay cash. NOT FL: tax payables, unearned revenue (not contractual). Equity: NO obligation to pay. Liability: HAS obligation to pay. Redeemable pref shares (holder demands) = LIABILITY; dividends = interest expense. Callable pref shares (issuer chooses) = EQUITY. Compound instruments (convertible bonds): split → liability (PV of cash flows) + equity (residual). Treasury shares = deducted from equity (never an asset; no gain/loss). Offsetting: ONLY if legally enforceable right + intention to net settle.',example:'DEF Corp: ₱1M convertible bonds at 5% coupon, similar non-convertible bonds at 8%. PV of bond CF at 8% = ₱880K = liability component. Equity = ₱1M − ₱880K = ₱120K (conversion option). Redeemable pref shares ₱500K: holder demands redemption → financial liability; dividends paid → interest expense in P&L. Repurchased own shares at ₱10K (treasury) → deducted from equity, no gain/loss recognized.',takeaway:'PAS 32: No obligation to pay = EQUITY. Has obligation to pay = LIABILITY. Convertible bonds = split debt + equity. Redeemable pref shares = LIABILITY. Treasury shares = deducted from equity, never an asset. Offsetting = rare, needs legal right + intent.'},
      {id:'PAS-33',cat:'PAS',code:'PAS 33',title:'Earnings Per Share',key:'Applies to publicly listed entities (or those in process). Basic EPS = (Profit − Preferred dividends) ÷ Weighted average ordinary shares. Preferred dividends: cumulative → deduct one-year whether declared or not; non-cumulative → deduct only if declared. Weighted average shares: time-weighted from issuance date. BONUS ISSUES/SPLITS/REVERSE SPLITS = RETROACTIVE adjustment for all periods. Rights issue with bonus element: adjustment factor = FV before ex-rights ÷ theoretical ex-rights FV. Diluted EPS: assumes conversion/exercise of all DILUTIVE potential shares (options, convertible bonds, warrants). Antidilutive = ignored. Convertible bonds: add after-tax interest to numerator, add incremental shares to denominator. Options: treasury stock method.',example:'EFG Corp: Net income ₱10M; cumulative pref dividends ₱500K. Jan 1: 2M shares. Apr 1: issue 500K shares → weighted 375K (×9/12). Aug 1: 200K bonus (retroactive to all). Basic EPS numerator = ₱9.5M; denominator = 2.2M+0.375M (adjusted for bonus) × appropriate retroactive factor. Diluted: add ₱300K after-tax convertible bond interest to numerator; add 100K incremental shares to denominator.',takeaway:'PAS 33: EPS = Profit ÷ Weighted Average Shares. Deduct preference dividends. Bonus/splits = retroactive adjustment. Diluted EPS includes all dilutive potential shares. Anti-dilutive options = ignored. Only required for listed entities.'},
      {id:'PAS-34',cat:'PAS',code:'PAS 34',title:'Interim Financial Reporting',key:'PAS 34 does NOT mandate who must report — applies when entity chooses or is required. Interim report: complete set (PAS 1) or condensed set (minimum headings/subtotals + selected notes). Periods for quarterly: SFP (quarter-end + last annual year-end); P&L (current quarter + YTD current + prior year YTD and quarter). Same accounting policies as annual FS. Income tax: best estimate of weighted average ANNUAL effective tax rate × YTD income. Revenues/costs arising unevenly: anticipate/defer only if done at year-end too. Impairment: recognize in interim; reverse only if permitted annually. Materiality = relative to interim period data.',example:'GHI Corp Q2 2023: SFP as of June 30, 2023 + Dec 31, 2022. P&L: Q2 2023 + H1 2023 + Q2 2022 + H1 2022 comparatives. Annual estimated tax rate 25%; H1 pre-tax ₱8M → H1 tax expense ₱2M. Year-end discretionary bonus ₱1.2M → expense only in Q4 when earned, not spread over 4 quarters.',takeaway:'PAS 34: Interim = mini annual report with same accounting policies. Tax = estimated annual rate × YTD income. Seasonal revenues: recognize when earned, not before. Consistency is key — no special interim accounting tricks.'},
      {id:'PAS-36',cat:'PAS',code:'PAS 36',title:'Impairment of Assets',key:'Recoverable amount = HIGHER of FVLCD (fair value less costs of disposal) and VIU (present value of estimated future cash flows from use + disposal). Impairment loss = CA − RA when CA > RA → P&L; if revalued asset → reduce revaluation surplus first. Annual impairment test (regardless of indicators): goodwill, intangibles with indefinite life, intangibles not yet available for use. Other assets: test when indicators exist. CGU = smallest identifiable group generating independent cash inflows. Impairment allocated: (1) goodwill first, then (2) other assets pro-rata by CA. Reversal: allowed (except goodwill — NEVER reversed); cannot exceed what CA would have been without original impairment. Post-impairment depreciation based on new CA.',example:'JKL Corp machinery: CA ₱800K; FVLCD = ₱600K; VIU = ₱700K. RA = ₱700K. Impairment loss = ₱100K → P&L. New depreciation: ₱700K ÷ 5 remaining years = ₱140K/yr. Next year: RA improves to ₱720K. Original-track CA = ₱800K−₱160K = ₱640K. Reversal = ₱640K − (₱700K−₱140K) = ₱80K → P&L.',takeaway:'PAS 36: Impairment = CA > Recoverable Amount. RA = HIGHER of FVLCD and VIU. Goodwill: test annually, NEVER reverse. Other assets: reverse if conditions improve. Write down when impaired. Write up cautiously, except goodwill — that stays down.'},
      {id:'PAS-37',cat:'PAS',code:'PAS 37',title:'Provisions, Contingent Liabilities and Contingent Assets',key:'PROVISION: recognize when ALL 3 met: (1) present obligation (legal or constructive) from past obligating event; (2) probable outflow (>50%); (3) reliable estimate. Measure: best estimate; large populations = expected value (probability-weighted); single obligation = most likely outcome. Discount if time value material. NO provisions for future operating losses. Onerous contracts: recognize immediately. Restructuring: only if (a) detailed formal plan AND (b) announced to those affected — before year-end. CONTINGENT LIABILITY: possible obligation OR non-probable/unestimable present obligation → DISCLOSE if not remote, do NOT recognize. CONTINGENT ASSET: possible inflow → DISCLOSE if probable; recognize only if virtually certain.',example:'MNO Corp: lawsuit, 75% chance of ₱10M loss → PROVISION ₱10M. If 30% chance → CONTINGENT LIABILITY, disclose only. If 5% → REMOTE, ignore. Environmental cleanup: constructive obligation from past practice → provision. Future planned losses from new division → NO provision (no past event). Restructuring plan approved and announced Dec 30 → provision for direct restructuring costs (not retraining, marketing, etc.).',takeaway:'PAS 37: Probable + Estimable = PROVISION (recognize). Possible = DISCLOSE. Remote = IGNORE. No provisions for future plans alone — needs past obligating event. Restructuring: formal plan + announcement before year-end. Book it when probable, note it when possible.'},
      {id:'PAS-38',cat:'PAS',code:'PAS 38',title:'Intangible Assets',key:'Intangible asset: identifiable, non-monetary, without physical substance. Three elements: (1) identifiability (separable or from contractual/legal rights); (2) control; (3) future economic benefits. Internally generated goodwill, brands, mastheads, customer lists = NEVER recognized. Research phase = EXPENSE always. Development phase = CAPITALIZE only if ALL 6 PIRATE criteria met: Probable future benefits; Intention to complete; Resources available; Ability to use or sell; Technical feasibility; Expenditure reliably measurable. Reinstatement of expensed costs = PROHIBITED. Finite useful life: AMORTIZE over shorter of useful life and legal life; assume zero residual unless active market/third-party commitment. Indefinite useful life: NO amortization; annual impairment test. Revaluation model: only if ACTIVE MARKET exists.',example:'PQR Corp: ₱2M basic research → EXPENSE. ₱5M product development meeting all PIRATE → CAPITALIZE; amortize ₱1M/year over 5yr life. Patent acquired ₱3M, legal life 10yr, useful life 8yr → amortize ₱375K/year over 8yr. Internally developed brand "LocalBrew" → NEVER recognized. If capitalized development becomes non-viable → impair; previously expensed costs cannot be reinstated.',takeaway:'PAS 38: Research = EXPENSE. Development = CAPITALIZE (if PIRATE met). Internally generated brands/goodwill/customer lists = NEVER recognized. Finite life = amortize. Indefinite life = impairment test annually. Once expensed, always expensed — no reinstatement.'},
      {id:'PAS-39',cat:'PAS',code:'PAS 39',title:'Financial Instruments: Recognition and Measurement',key:'Largely superseded by PFRS 9 (effective Jan 1, 2018). Four categories: (1) FVTPL — FV changes to P&L; (2) Held-to-Maturity (HTM) — amortized cost; (3) Loans and Receivables — amortized cost; (4) Available-for-Sale (AFS) — FV changes to OCI; recycled to P&L on disposal. Tainting rule: selling any HTM investment before maturity → entire HTM portfolio reclassified to AFS for 2 years. Impairment: incurred loss model (recognize only when loss event occurs). Hedge accounting: fair value hedge, cash flow hedge, hedge of net investment in foreign operation.',example:'STU Corp holds bonds classified as AFS. FV rises ₱100K → unrealized gain in OCI. When sold: recycle ₱100K from OCI to P&L (recycling). If HTM bonds sold early → tainting: all remaining HTM reclassified to AFS for next 2 years. Impairment: recognized only when there is objective evidence (loss event); no forward-looking expected losses.',takeaway:'PAS 39 (superseded by PFRS 9): Four categories of FA. AFS gains → OCI until sold (then recycled). HTM = amortized cost. Tainting rule: sell one HTM early → lose entire HTM classification for 2 years. Replaced by more principle-based PFRS 9.'},
      {id:'PAS-40',cat:'PAS',code:'PAS 40',title:'Investment Property',key:'Investment property: LAND or BUILDING held to EARN RENTALS or for CAPITAL APPRECIATION (or both) — not owner-occupied, not for sale in ordinary course, not under finance lease. Examples: land for capital appreciation, land with undetermined use, buildings under operating leases. NOT IP: owner-occupied property, property for sale in ordinary course (inventory), property being developed for future owner use. Initial: at COST. Subsequent (applied to ALL IP, one model): (1) COST MODEL: cost − depreciation − impairment (per PAS 16); or (2) FAIR VALUE MODEL: FV at each year-end; ALL FV changes → P&L; NO depreciation. FV always disclosed regardless of model. Transfers only when USE changes. Disposal: proceeds − CA → P&L.',example:'STU Corp: building leased to third parties (investment property). Fair Value Model: Jan 1 CA ₱18M; Dec 31 FV ₱20M → ₱2M gain in P&L (NOT OCI — contrast with PAS 16 revaluation). No depreciation. Cost Model: depreciate ₱18M/30yr = ₱600K/yr; disclose FV ₱20M in notes. Decision to use building for own offices → transfer to PPE at FV ₱20M at date of transfer.',takeaway:'PAS 40: Investment property = held for rent or capital gain (not own use). Two models: Cost (depreciate) or FV (no depreciation, changes to P&L). KEY DIFFERENCE from PAS 16: FV changes go to P&L not OCI. Must disclose FV regardless of model.'},
      {id:'PAS-41',cat:'PAS',code:'PAS 41',title:'Agriculture',key:'Biological asset: living animal or plant. Agricultural produce: harvested produce. Bearer plants (used repeatedly to produce for multiple years: fruit trees, rubber trees, oil palms, grapevines) → PPE under PAS 16. Produce ON bearer plants = biological asset (PAS 41). Consumable biological assets (for slaughter/harvest: pigs, chickens, annual crops) → PAS 41. Initial and subsequent: FV LESS COSTS TO SELL (every reporting period). ALL FV changes → P&L. Exception: if FV not reliably measurable → cost less depreciation/impairment. Agricultural produce at HARVEST: measured at FV less costs to sell → becomes cost for PAS 2 inventory. Unconditional government grants: recognize when receivable. Conditional: recognize when conditions met.',example:'VWX Farm: 200 pigs. Jan 1: FV less costs = ₱2M. Dec 31: FV less costs = ₱2.5M → ₱500K gain in P&L. When slaughtered: pork valued at FV less costs ₱2.6M at harvest → PAS 2 inventory cost. Mango tree = bearer plant (PPE/PAS 16); mangoes on tree = biological assets (PAS 41); harvested mangoes = agricultural produce then PAS 2 inventory.',takeaway:'PAS 41: Biological assets = FV less costs to sell, always. All FV changes → P&L (not OCI). At harvest → PAS 2 inventory cost. Bearer plants (fruit trees, etc.) = PPE under PAS 16, not PAS 41. Living things valued at what you can get for them today.'},
      {id:'PFRS-1',cat:'PFRS',code:'PFRS 1',title:'First-time Adoption of PFRS',key:'First PFRS FS: first annual FS with explicit and unreserved compliance statement. Opening PFRS SFP at transition date (beginning of earliest comparative period). General rule: FULL RETROSPECTIVE APPLICATION of all current PFRSs. Mandatory exceptions (must not apply retrospectively): derecognition of FA/FL, hedge accounting, estimates at transition date (no hindsight), non-controlling interests. Optional exemptions: business combinations (not required to restate), deemed cost (FV as cost for PPE/IP/intangibles), cumulative translation differences (reset to zero), share-based payments, compound instruments. Required: reconciliation of equity and comprehensive income from previous GAAP to PFRSs at (1) transition date and (2) end of last period under previous GAAP. Applied ONCE only.',example:'BCD Corp (previously Philippine GAAP) adopts PFRSs first time in 2024. Transition date = Jan 1, 2023. Opens Jan 1, 2023 PFRS SFP: recognize/derecognize assets-liabilities per PFRSs; adjustments to retained earnings. Presents Dec 31, 2024 FS + Dec 31, 2023 comparative + reconciliation notes explaining how equity moved from Phil GAAP to PFRSs at Jan 1, 2023 and Dec 31, 2023.',takeaway:'PFRS 1: First time on PFRSs = restate everything backward to the transition date (with specific exceptions). Must provide reconciliation showing before vs. after. Applied once and never again. Fresh start — show us how you got here.'},
      {id:'PFRS-2',cat:'PFRS',code:'PFRS 2',title:'Share-based Payment',key:'Three types: (1) Equity-settled: receive goods/services, pay by issuing equity. (2) Cash-settled: receive goods/services, pay cash based on equity FV. (3) Choice of settlement. Equity-settled with NON-EMPLOYEES: FV of goods/services received (priority); if not determinable → FV of equity instruments at date received. Equity-settled with EMPLOYEES: FV of equity instruments at GRANT DATE (fixed — no remeasurement). Recognize expense over vesting period; credit equity. Cash-settled (SARs): FV of liability remeasured EVERY YEAR-END until settlement; changes → P&L. Market conditions: included in grant date FV, no true-up. Non-market: true-up for expected forfeitures each year-end. Equity component from share-based: never derecognized, transfer within equity only.',example:'EFG Corp: 10,000 share options to employees, 3-year vesting, grant date FV ₱30/option, 5% expected forfeitures. Year 1: (10,000 × 95%) × ₱30 × 1/3 = ₱95K expense. Year 2: revised estimate used for cumulative adjustment. Year 3 actual: total expense = FV of options that actually vested. SARs (cash-settled): FV ₱30 at grant; ₱35 at Year 1 year-end → recognize based on ₱35 (remeasured). At settlement: final FV used.',takeaway:'PFRS 2: Equity-settled = grant date FV, recognize over vesting period (no remeasurement). Cash-settled = remeasure EVERY year-end until settled. Giving shares as payment is not free — it is an expense at fair value.'},
      {id:'PFRS-3',cat:'PFRS',code:'PFRS 3',title:'Business Combinations',key:'ACQUISITION METHOD required — pooling of interests PROHIBITED. Steps: (1) Identify acquirer; (2) Determine acquisition date; (3) Recognize identifiable assets/liabilities at FV; (4) Recognize goodwill or bargain purchase. Goodwill = (Consideration + NCI + Previously held equity interest) − FV of net identifiable assets. NCI: either (a) full goodwill method (NCI at FV) or (b) partial goodwill (NCI at proportionate share of net assets) — choose per transaction. Contingent consideration: FV at acquisition; changes → P&L (FL) or equity. Acquisition-related costs (legal, advisory): EXPENSED, NOT added to goodwill. Goodwill: asset, NOT AMORTIZED, ANNUALLY IMPAIRMENT TESTED. Bargain purchase (negative GW): reassess then recognize in P&L.',example:'GHI Corp acquires 80% of JKL Inc. Consideration ₱12M; FV of JKL net assets ₱10M; NCI at proportionate share = 20%×₱10M = ₱2M. Goodwill = ₱12M+₱2M−₱10M = ₱4M (noncurrent asset, never amortized). Legal fees ₱500K → expensed. Contingent earn-out ₱1M (50% probability) → recognized at FV ₱500K; if conditions not met → P&L adjustment.',takeaway:'PFRS 3: Business combinations = Acquisition Method only. Goodwill = Price + NCI − FV of net assets. Transaction costs = EXPENSE, not capitalized. Goodwill: never amortize, impairment test annually. NCI at FV = full goodwill; at proportionate share = partial goodwill.'},
      {id:'PFRS-4',cat:'PFRS',code:'PFRS 4',title:'Insurance Contracts (Interim)',key:'Interim standard that allowed insurers to continue using pre-existing accounting policies with limited improvements. Required: liability adequacy test to ensure insurance liabilities not understated. Prohibited: provisions for possible claims under contracts not yet in existence. Permitted: shadow accounting. Required disclosures: information about amounts, timing, and uncertainty of future cash flows from insurance contracts. SUPERSEDED by PFRS 17 effective Jan 1, 2023.',example:'MNO Insurance Co. under PFRS 4 continued its existing local GAAP for insurance liabilities. Performed liability adequacy test: existing reserves adequate. Disclosed claims development tables and concentration of insurance risk. Did not need to apply PFRS 17 measurement framework until transition date.',takeaway:'PFRS 4 was a temporary standard — hold the fort until PFRS 17. Required a liability adequacy test. Permitted wide diversity in practices. Fully replaced by PFRS 17 for annual periods beginning Jan 1, 2023.'},
      {id:'PFRS-5',cat:'PFRS',code:'PFRS 5',title:'Non-current Assets Held for Sale and Discontinued Operations',key:'HFS Classification — BOTH required: (1) Available for immediate sale in PRESENT CONDITION; (2) Sale HIGHLY PROBABLE: management committed + active buyer search + reasonable price relative to FV + expected within 12 months + plan unlikely withdrawn. HFS: measure at LOWER of CA and FV less costs to sell. STOP DEPRECIATION. Impairment to P&L; reversal up to cumulative impairment only. HFS criteria met after year-end = non-adjusting event. Assets to be ABANDONED ≠ HFS. DISCONTINUED OPERATION: component disposed of or HFS representing major line of business or geographic area. Single post-tax amount in P&L after continuing operations. Disposal group: assets + related liabilities disposed together.',example:'MNO Corp Dec 1: commits to sell manufacturing division. Management approved, actively marketed, priced at FV, sale expected May (within 12 months). HFS classification Dec 1: stop depreciation, measure at lower of CA or FV less costs. In P&L: manufacturing results shown as discontinued ops — single post-tax line after continuing ops profit. Assets and liabilities of division presented separately in SFP.',takeaway:'PFRS 5: HFS = stop depreciating, measure at lower of CA or FV-less-costs. Must be available NOW and sale HIGHLY PROBABLE. Discontinued ops = ONE LINE after continuing ops (net of tax). Assets to be abandoned ≠ HFS. Selling it? Stop wearing it out and show it separately.'},
      {id:'PFRS-6',cat:'PFRS',code:'PFRS 6',title:'Exploration for and Evaluation of Mineral Resources',key:'Scope: expenditures AFTER legal rights obtained but BEFORE technical feasibility and commercial viability are demonstrable. Temporary exemption from PAS 8 hierarchy: entities may continue previous accounting policies — may capitalize or expense E&E costs. E&E assets include: drilling rights, drilling costs, sampling, geological studies. Classified as tangible or intangible based on nature. Subsequent: cost model or revaluation model. Impairment triggers (different from PAS 36): right expired; no future expenditures planned; no minerals found; unlikely to recover carrying amount. Reclassify when viability established: test for impairment first.',example:'PQR Mining spends ₱80M: mineral rights ₱30M (intangible E&E) + drilling/sampling ₱50M (tangible E&E). Capitalizes all per policy. After 3 years: reserves confirmed viable → reclassify to development assets (PPE); test for impairment first. If no viable reserves: write off E&E assets to P&L.',takeaway:'PFRS 6: Exploration costs can be capitalized before you know if the mine is viable. Once commercial viability confirmed → reclassify to development assets. Scope is narrow: BEFORE feasibility. PFRS 6 is the placeholder — Explore now, classify later.'},
      {id:'PFRS-7',cat:'PFRS',code:'PFRS 7',title:'Financial Instruments: Disclosures',key:'Two main disclosure categories: (1) SIGNIFICANCE: carrying amounts by PFRS 9 category; FV by category; income/expense/gains-losses; reclassifications; collateral; defaults/breaches; allowance for ECL. (2) RISKS — qualitative (objectives, policies, processes) + quantitative: CREDIT RISK (max exposure, credit quality, past-due analysis, collateral); LIQUIDITY RISK (maturity analysis of financial liabilities); MARKET RISK — (a) currency risk, (b) interest rate risk, (c) other price risk; sensitivity analysis for each market risk (e.g., 1% rate change effect on profit).',example:'STU Bank discloses: Credit risk — loan portfolio ₱50B max exposure; 90-day past due ₱500M. Liquidity risk — maturity schedule: <1yr ₱30B, 1–5yr ₱15B, >5yr ₱5B. Interest rate risk sensitivity — 100bps increase → NII increases ₱200M. Currency risk — USD assets ₱10B; 10% PHP depreciation → ₱1B loss. All quantitative data plus qualitative risk management policies disclosed.',takeaway:'PFRS 7: Disclose WHAT you hold (significance) AND the RISKS (credit, liquidity, market). Three market risks: Currency, Interest rate, Other price. Sensitivity analysis required for market risk. Show the risk, not just the number.'},
      {id:'PFRS-8',cat:'PFRS',code:'PFRS 8',title:'Operating Segments',key:'Applies to publicly listed entities. MANAGEMENT APPROACH: segments = how CODM (Chief Operating Decision Maker) reviews performance and allocates resources. CODM = function (CEO, COO, executive committee). Aggregation: combine similar segments if economically and operationally similar. Quantitative thresholds — reportable if ANY: (1) Revenue ≥10% of combined revenues; (2) Profit/loss ≥10% of greater of total profit or total loss; (3) Assets ≥10% of combined assets. Minimum external revenue requirement: total external revenue of all reported segments ≥75% of entity total. Disclosures per segment: revenue (external + inter-segment), P&L, assets, liabilities (if reviewed by CODM). Major customer: single customer ≥10% of total revenues → disclose.',example:'VWX Group: total revenue ₱100M. Segment A ₱15M revenue, ₱3M profit, ₱20M assets → reportable (all thresholds). Segment E ₱8M revenue, ₱500K profit, ₱5M assets → below 10% all thresholds. But if A+B+C+D external revenue = 65% only, must add E to reach 75% minimum. Major customer ABC Corp = ₱12M (12% of revenue) → disclose its existence (not necessarily name).',takeaway:'PFRS 8: Segments follow MANAGEMENT\'S view (how CODM slices the business). Reportable if ≥10% of revenues, profits, or assets. Cover ≥75% of external revenues. Major customer ≥10% = must disclose. The way management sees the business is how you report it.'},
      {id:'PFRS-9',cat:'PFRS',code:'PFRS 9',title:'Financial Instruments',key:'Classification of FA: based on (1) Business model + (2) SPPI test (cash flows Solely Payments of Principal and Interest). Three categories: (a) AMORTIZED COST — hold to collect + SPPI; (b) FVOCI mandatory — hold to collect and sell + SPPI; (c) FVPL — all others (default). Equity instruments: FVTPL default; OR irrevocably elect FVOCI (FV changes never recycled to P&L; dividends still to P&L). Option to designate at FVPL to eliminate accounting mismatch. Impairment: EXPECTED CREDIT LOSS (ECL) model — 3 stages: Stage 1 (no significant credit increase) = 12-month ECL; Stage 2 (significant credit increase) = lifetime ECL; Stage 3 (credit-impaired) = lifetime ECL. Reclassification: only when business model changes (rare). Equity: cannot reclassify. FL: generally amortized cost; own credit risk changes for FVPL FL → OCI (not recycled).',example:'YZA Corp: (1) Bonds held to maturity collecting interest → Amortized Cost. (2) Bonds held to collect but also sold opportunistically → FVOCI. (3) Bonds actively traded → FVPL. (4) Shares in listed company → elect FVOCI (dividends to P&L; FV changes in OCI; never recycled even on disposal). ECL: recognize 12-month ECL on origination. Credit deteriorates → lifetime ECL. Customer defaults → Stage 3, interest on net CA.',takeaway:'PFRS 9 replaces PAS 39. Classify FA by: what you plan to do with it (business model) + whether cash flows are SPPI. ECL = recognize credit losses BEFORE they happen (expected not incurred). Equity = FVTPL unless elect FVOCI (no recycling). Classify by intent; provision before things go wrong.'},
      {id:'PFRS-10',cat:'PFRS',code:'PFRS 10',title:'Consolidated Financial Statements',key:'CONTROL: investor controls investee when it has ALL THREE: (1) POWER (existing rights to direct relevant activities); (2) EXPOSURE/RIGHTS to variable returns; (3) ABILITY to use power to affect returns. Power usually from voting rights (>50% presumed). Power without majority: contractual arrangements, potential voting rights, de facto control. Protective rights ≠ power. CONSOLIDATION: line-by-line addition; eliminate: (1) investment vs. subsidiary equity; (2) intragroup transactions; (3) intragroup balances; (4) unrealized intragroup profits. NCI: in equity, separately from parent shareholders. TCI attributed to NCI even if deficit. Loss of control: derecognize subsidiary; recognize gain/loss; retain interest at FV. Uniform accounting policies; same reporting dates (±3 months max).',example:'BCD Corp (70% JKL Inc.) consolidates: total assets = BCD ₱100M + JKL ₱50M − intercompany elimination ₱5M = ₱145M. JKL equity at acquisition eliminated vs. BCD\'s Investment in JKL account; goodwill recorded. Intercompany sale ₱10M: eliminate ₱10M revenue and COGS; ₱3M unrealized profit in JKL inventory also eliminated. NCI (30%) shown within equity.',takeaway:'PFRS 10: Control = Power + Variable Returns + Ability to use power. All subsidiaries consolidated. Eliminate ALL intragroup transactions. NCI shown in equity. One group, one set of financials — eliminate everything that happened within the family.'},
      {id:'PFRS-11',cat:'PFRS',code:'PFRS 11',title:'Joint Arrangements',key:'Joint arrangement: two or more parties with JOINT CONTROL (unanimous consent for relevant activity decisions). Two types: (1) JOINT OPERATION — parties have rights to ASSETS and obligations for LIABILITIES → recognize own share of assets, liabilities, revenue, expenses directly using applicable PFRSs (line-by-line share). (2) JOINT VENTURE — parties have rights to NET ASSETS → EQUITY METHOD under PAS 28 (one-line method; proportionate consolidation PROHIBITED). Classification: depends on structure (separate vehicle or not), legal form, contractual terms, and other facts/circumstances. Unincorporated arrangement = usually joint operation. Separate incorporated entity = usually joint venture (but examine substance).',example:'GHI and JKL: (a) Form unincorporated pipeline venture — each directly owns 50% of pipe and responsible for own costs → JOINT OPERATION; each records 50% of pipeline as PPE, 50% of costs as expenses, 50% of revenues. (b) Form MNO Corp together (50/50 incorporated) → JOINT VENTURE → each uses equity method to account for investment in MNO Corp.',takeaway:'PFRS 11: Joint control = unanimous consent. JO = right to assets/liabilities → account for your share directly. JV = right to net assets → equity method only. Proportionate consolidation for JVs is gone. Know what you own: assets or net assets?'},
      {id:'PFRS-12',cat:'PFRS',code:'PFRS 12',title:'Disclosure of Interests in Other Entities',key:'Applies to interests in: subsidiaries, joint arrangements (JO and JV), associates, unconsolidated structured entities. SUBSIDIARIES: significant judgments and assumptions; composition of group; NCI details (profit/loss allocated, equity, dividends); restrictions on assets/liabilities; effects of ownership changes. ASSOCIATES and JVs: name, country, nature, ownership; summarized financial information for material ones; FV if listed. UNCONSOLIDATED STRUCTURED ENTITIES: nature, purpose, size, activities; maximum loss exposure; financial support provided/intended. Investment entities: additional disclosures for unconsolidated subsidiaries at FV. Focus: nature of interests AND risks.',example:'MNO Corp discloses: subsidiaries PQR Inc. (100% Philippines) and STU Corp (80% Singapore); NCI in STU = ₱3M (20%); material associate VWX Ltd. (35%): total assets ₱20M, revenue ₱15M, profit ₱2M, FV ₱8M (listed); securitization vehicle: max loss exposure ₱5M, not consolidated because no control; no additional financial support intended.',takeaway:'PFRS 12: The disclosure companion to PFRS 10, 11, and PAS 28. Disclose nature and risks of ALL interests in other entities. Shows everything you are connected to and explains the risks.'},
      {id:'PFRS-13',cat:'PFRS',code:'PFRS 13',title:'Fair Value Measurement',key:'Fair value: EXIT PRICE — received to sell asset or paid to transfer liability in orderly transaction between market participants at measurement date (NOT entry price/transaction price). Measurement in PRINCIPAL MARKET (most volume); if none, MOST ADVANTAGEOUS MARKET. Price NOT adjusted for transaction costs (but adjusted for transport costs if location is a characteristic). FV Hierarchy: LEVEL 1 — quoted prices in active markets for IDENTICAL assets/liabilities (most reliable); LEVEL 2 — observable inputs other than L1; LEVEL 3 — unobservable inputs/management assumptions (least reliable). Always maximize use of highest level available. Non-financial assets: HIGHEST AND BEST USE. Three valuation techniques: market approach, income approach (DCF), cost approach.',example:'PQR Corp values office building: no identical building sold (no L1). Uses comparable sales nearby (observable, L2 inputs) → FV = ₱50M. If no comparables, uses DCF based on expected rents at market discount rate (L3 inputs) → FV = ₱48M. Discloses: L2 measurement; market approach; key inputs (₱30K/sqm, 5% vacancy). Highest and best use: current use as office building maximizes value.',takeaway:'PFRS 13: Fair value = EXIT PRICE (what you\'d sell it for). Three levels: L1 = market quote (best), L2 = observable data, L3 = your own model. Always use highest available level. Non-financial assets: value at HIGHEST AND BEST USE. Fair value is a market perspective, not your cost.'},
      {id:'PFRS-14',cat:'PFRS',code:'PFRS 14',title:'Regulatory Deferral Accounts',key:'Applies ONLY to first-time PFRS adopters with rate-regulated activities — existing PFRS users cannot apply. Rate regulation: rate regulator (e.g., Energy Regulatory Commission) sets prices. May continue previous GAAP recognition/measurement for regulatory deferral accounts. Cannot change policy to START recognizing new regulatory deferral accounts. Presentation: regulatory deferral debit/credit balances = SEPARATE LINE ITEMS in SFP outside normal current/noncurrent subtotals. Movements shown separately in P&L and OCI. PAS 12 applies to related deferred tax. PFRS 14 is interim pending IASB permanent standard.',example:'STU Power Corp (electricity distributor, rates set by ERC) adopts PFRSs first time 2024. Previous GAAP recognized ₱200M regulatory asset (deferred charges approved by regulator). Under PFRS 14: continue carrying ₱200M as regulatory deferral — shown as special separate line item in SFP, outside current/noncurrent totals. Movements presented separately in P&L.',takeaway:'PFRS 14: Niche standard for regulated utilities adopting PFRSs for the first time. Grace period — maintain old regulatory accounting during first PFRS period. Cannot be applied by existing PFRS users. Temporary until IASB completes permanent rate-regulation standard.'},
      {id:'PFRS-15',cat:'PFRS',code:'PFRS 15',title:'Revenue from Contracts with Customers',key:'5-STEP MODEL: Step 1: IDENTIFY CONTRACT (enforceable; collectability probable; approved). Step 2: IDENTIFY PERFORMANCE OBLIGATIONS (each distinct good/service; distinct = customer can benefit alone/with available resources AND separately identifiable from other promises). Step 3: DETERMINE TRANSACTION PRICE (consideration expected; estimate variable consideration; constrain to highly probable not to reverse). Step 4: ALLOCATE transaction price (based on relative stand-alone selling prices). Step 5: RECOGNIZE REVENUE when (point in time) or as (over time) PO is satisfied. Over-time criteria: simultaneously receives/consumes; creates/enhances customer-controlled asset; no alternative use + enforceable right to payment. Contract costs: incremental costs to obtain (capitalize, amortize) or fulfill. Presentation: contract liability (consideration received before transfer); contract asset (conditional right); receivable (unconditional right).',example:'VWX Corp: ₱1.2M contract for machine (stand-alone ₱900K) + 2-year maintenance (stand-alone ₱300K). Allocation: machine ₱900K; maintenance ₱300K. Machine delivered at signing → ₱900K revenue at point in time (control transfers). Maintenance = over time → ₱150K/year. Sales commission ₱60K to salesperson → capitalize, amortize over contract period.',takeaway:'PFRS 15: Five-step revenue model. Key: Is each element DISTINCT (separate PO)? Is it satisfied OVER TIME or AT A POINT IN TIME? Allocate on stand-alone prices. Recognize revenue when CONTROL transfers. Recognize revenue when (or as) you deliver — not when you bill.'},
      {id:'PFRS-16',cat:'PFRS',code:'PFRS 16',title:'Leases',key:'IDENTIFYING LEASE: contract conveys right to CONTROL use of IDENTIFIED ASSET for period in exchange for consideration. Three elements: identified asset; right to obtain substantially all economic benefits; right to direct use. Substantive substitution right → not identified asset. LESSEE (general recognition): recognize ROU ASSET and LEASE LIABILITY at commencement for ALL leases except short-term (≤12 months) and low-value. Lease liability = PV of unpaid lease payments (rate implicit in lease or incremental borrowing rate). ROU asset = initial lease liability + initial direct costs + prepayments − incentives + dismantlement costs. Depreciate ROU over shorter of useful life or lease term. Payments split: interest (effective rate method → P&L) + principal (reduces liability). EXEMPTIONS: short-term and low-value → straight-line expense. LESSOR: finance lease (transfers substantially all risks/rewards) → derecognize asset, recognize receivable. Operating lease → keep asset, recognize income straight-line.',example:'YZA Corp: 5-year office lease, annual payment ₱1M in arrears, implicit rate 8%. Lease liability = PV annuity ₱1M @8%, 5yr = ₱3,993K. ROU asset = ₱3,993K. Year 1: interest = ₱319K (P&L); principal = ₱681K (reduces liability); depreciation = ₱799K (P&L). No more ₱1M rent expense. Short-term 11-month lease: expense ₱100K/month straight-line.',takeaway:'PFRS 16: Lessees put ALL leases on balance sheet (ROU asset + Lease Liability). P&L shows depreciation + interest (not rent). Short-term (≤12 months) or low-value = expense only. Lessors unchanged: finance vs. operating lease. No more off-balance sheet leases.'},
      {id:'PFRS-17',cat:'PFRS',code:'PFRS 17',title:'Insurance Contracts',key:'Scope: insurance contracts issued; reinsurance contracts held; investment contracts with DPF (discretionary participation features). Insurance contract: insurer accepts SIGNIFICANT INSURANCE RISK from policyholder and agrees to compensate if insured event occurs. Insurance risk = risk OTHER THAN financial risk. GENERAL MEASUREMENT MODEL (BBA): Insurance contracts = Fulfilment cash flows (PV of future CFs + risk adjustment for non-financial risk) + Contractual Service Margin (CSM). CSM = unearned profit; released to P&L as insurance services provided (coverage period). Changes in estimates → adjust CSM first; if onerous → P&L immediately. PREMIUM ALLOCATION APPROACH (PAA): simplified for ≤1 year coverage or where approximates BBA. VARIABLE FEE APPROACH (VFA): for contracts with direct participation features. Insurance service result (revenue − service expenses) in P&L; insurance finance income/expenses in P&L or split P&L/OCI (policy choice). Effective Jan 1, 2023.',example:'BCD Life Insurance: 20-year endowment policies. Premiums ₱100M; PV of expected claims/expenses = ₱85M; risk adjustment = ₱5M; fulfilment CF = ₱90M; CSM at inception = ₱10M (unearned profit). Each year: 1/20 of CSM = ₱500K released as insurance revenue. If experience worse than expected → reduce remaining CSM; if CSM exhausted → loss in P&L. Motor insurer with 1-year policies → PAA (simpler: liability = unearned premiums).',takeaway:'PFRS 17: Insurance contracts measured using BBA (fulfilment cash flows + CSM). CSM = unearned profit released over coverage period. PAA = simplified for short-duration (motor, fire insurance). Insurance is now as transparent as any other financial instrument.'},
      {id:'IFRS-S1',cat:'Sustainability',code:'IFRS S1',title:'General Requirements for Disclosure of Sustainability-related Financial Information',key:'4 pillars: governance, strategy, risk, metrics',example:'Board ESG committee; climate risk affects supply chain; metrics and targets disclosed.',takeaway:'IFRS S1 = Use the 4 pillars for ALL sustainability-related risks and opportunities.'},
      {id:'IFRS-S2',cat:'Sustainability',code:'IFRS S2',title:'Climate-related Disclosures',key:'Physical + transition risks; GHG emissions disclosure',example:'Coastal factory flood risk (physical); carbon tax exposure (transition); emissions targets.',takeaway:'IFRS S2 = IFRS S1 applied to CLIMATE. Disclose physical and transition risks and emissions.'}
    ];

    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const overlay = document.getElementById('overlay');
    const modalContent = document.getElementById('modalContent');
    const toast = document.getElementById('toast');
    const errbox = document.getElementById('errbox');
    let currentCat = 'all';

    function renderCards(){
      const query = (search.value||'').toLowerCase().trim();
      const items = STANDARDS.filter(item => {
        const matchesCat = currentCat === 'all' || item.cat === currentCat;
        const text = `${item.code} ${item.title} ${item.key} ${item.takeaway}`.toLowerCase();
        return matchesCat && text.includes(query);
      });
      grid.innerHTML='';
      if(!items.length){ document.getElementById('empty').style.display='block'; return; }
      document.getElementById('empty').style.display='none';
      items.forEach(item => {
        const card = document.createElement('article');
        card.className='card';
        card.innerHTML=`<span class="code">${item.code}</span><div class="card-title">${item.title}</div><div class="card-sub">${item.takeaway}</div>`;
        card.addEventListener('click',()=>openModal(item));
        grid.appendChild(card);
      });
    }

    function openModal(item){
      modalContent.innerHTML=`<h2>${item.code} — ${item.title}</h2>
        <div class="field"><strong>Key</strong><div>${item.key||'n/a'}</div></div>
        <div class="field"><strong>Example</strong><div>${item.example||'n/a'}</div></div>
        <div class="field"><strong>Takeaway</strong><div>${item.takeaway||'n/a'}</div></div>
        <div class="actions"><button class="btn" id="copyBtn">Copy prompt</button></div>`;
      document.getElementById('copyBtn')?.addEventListener('click',()=>{
        copyText(`${item.code} - ${item.title}: ${item.takeaway}`).then(()=>showToast('Copied')).catch(()=>showToast('Copy failed'));
      });
      overlay.classList.add('show');
    }

    function closeModal(){ overlay.classList.remove('show'); }
    document.getElementById('closeBtn')?.addEventListener('click',closeModal);
    overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });

    function showToast(message='Copied'){ toast.textContent=message; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1800); }
    function copyText(text){
      if(navigator.clipboard?.writeText){ return navigator.clipboard.writeText(text); }
      return new Promise((resolve,reject)=>{
        const textarea=document.createElement('textarea'); textarea.value=text; document.body.appendChild(textarea); textarea.select();
        const ok=document.execCommand('copy'); document.body.removeChild(textarea); ok ? resolve() : reject();
      });
    }

    document.querySelectorAll('[data-cat]').forEach(btn => btn.addEventListener('click',()=>{
      document.querySelectorAll('[data-cat]').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); currentCat=btn.dataset.cat; renderCards();
    }));
    search.addEventListener('input',renderCards);

    const themeToggle=document.getElementById('themeToggle');
    function setTheme(dark){ document.body.setAttribute('data-theme', dark?'dark':'light'); try{ localStorage.setItem('cfas-dark', dark?'1':'0'); }catch(e){} }
    if(localStorage.getItem('cfas-dark')==='1') setTheme(true);
    themeToggle.addEventListener('click',()=> setTheme(document.body.getAttribute('data-theme')!=='dark'));

    function showError(message){ errbox.textContent=message; errbox.classList.add('show'); }
    window.addEventListener('error', e=>showError(e.message||'Runtime error'));
    window.addEventListener('unhandledrejection', e=>showError(e.reason?.message||'Unhandled promise rejection'));

    renderCards();
  </script>
</body>
</html>
